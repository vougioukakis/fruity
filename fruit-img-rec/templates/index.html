<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FRUITY</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="/static/styles/style.css">
</head>
<body>

    <div id="header">
    </div>

    <div id="main-area" class="container overflow-auto">
      
      <div class="input-bar-container" id="bottom-bar">
        <form class="file-upload" action="/upload" method="POST" enctype="multipart/form-data">
          <span id="file-upload-label" class="file-upload-label" style="display: none;">No file chosen</span>
  
          <label for="image-input" id="upload-button" class="custom-file-upload btn btn-primary"><img src = "../static/assets/plus.png" alt="add-file" id="upload-icon"/></label>
          <input type="file" id="image-input" name="disease-image" accept="image/*">
  
          <button type="submit" class="btn btn-success" id="diagnose-button" disabled>Recognise</button>
        </form>

        <img id="fruit-img" style="width: 250px; height: 250px;">
      </div>

      <div id="output-area">
        <ul>
           <li class="results-item" id="fruit-name"></li>
           <li class="results-item" id="calories"></li>
           <li class="results-item" id="carbs"></li>
           <li class="results-item" id="protein"></li>
           <li class="results-item" id="fat"></li>
        </ul>
      </div>

      <div id="fact-container">
        <div id="fact-text"></div>
      </div>

      <button id="get-fact-btn">Get Fact</button>
      
    </div>

    <div id="footer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <script defer>
      function adjustBodyPadding() {
          const bottomBarHeight = document.querySelector('#bottom-bar').offsetHeight;
          document.body.style.paddingBottom = bottomBarHeight + 'px';
      }

      // Adjust padding on load and resize
      window.addEventListener('load', adjustBodyPadding);
      window.addEventListener('resize', adjustBodyPadding);
    </script>
    <script src="/static/img-rec-app.js" defer></script>
</body>
</html>
